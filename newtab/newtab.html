<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabLaunch</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div class="container">
    <h1 class="clock" id="clock"></h1>
    <p class="date" id="date"></p>

    <div class="bookmarks-grid" id="bookmarks-grid">
      <!-- Bookmarks rendered here -->
    </div>

    <div class="toolbar">
      <button class="modify-btn" id="modify-btn">Modify</button>
      <button class="modify-btn" id="export-btn">Export</button>
      <button class="modify-btn" id="import-btn">Import</button>
    </div>
  </div>

  <!-- Add / Edit Dialog -->
  <div class="dialog-overlay" id="dialog-overlay">
    <div class="dialog">
      <h2 id="dialog-title">Add Bookmark</h2>
      <form id="bookmark-form">
        <label for="input-name">Name</label>
        <input type="text" id="input-name" placeholder="e.g. GitHub" required>

        <label for="input-url">URL</label>
        <input type="url" id="input-url" placeholder="https://github.com" required>

        <div class="dialog-actions">
          <button type="button" class="btn btn-secondary" id="btn-cancel">Cancel</button>
          <button type="button" class="btn btn-danger" id="btn-delete" style="display:none">Delete</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../storage.js"></script>
  <script src="newtab.js"></script>
</body>
</html>
