<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div class="container">
    <h1 class="clock" id="clock"></h1>
    <p class="date" id="date"></p>

    <div class="bookmarks-grid" id="bookmarks-grid">
      <!-- Bookmarks rendered here -->
    </div>

    <button class="modify-btn" id="modify-btn">Modify</button>
  </div>

  <!-- Add / Edit Dialog -->
  <div class="dialog-overlay" id="dialog-overlay">
    <div class="dialog">
      <h2 id="dialog-title">Add Bookmark</h2>
      <form id="bookmark-form">
        <label for="input-name">Name</label>
        <input type="text" id="input-name" placeholder="e.g. GitHub" required>

        <label for="input-url">URL</label>
        <input type="url" id="input-url" placeholder="https://github.com" required>

        <label for="input-color">Color</label>
        <div class="color-picker" id="color-picker">
          <button type="button" class="color-swatch" data-color="#4A90D9" style="background:#4A90D9"></button>
          <button type="button" class="color-swatch" data-color="#E74C3C" style="background:#E74C3C"></button>
          <button type="button" class="color-swatch" data-color="#2ECC71" style="background:#2ECC71"></button>
          <button type="button" class="color-swatch" data-color="#F39C12" style="background:#F39C12"></button>
          <button type="button" class="color-swatch" data-color="#9B59B6" style="background:#9B59B6"></button>
          <button type="button" class="color-swatch" data-color="#1ABC9C" style="background:#1ABC9C"></button>
          <button type="button" class="color-swatch" data-color="#E67E22" style="background:#E67E22"></button>
          <button type="button" class="color-swatch" data-color="#34495E" style="background:#34495E"></button>
        </div>
        <input type="hidden" id="input-color-value" value="#4A90D9">

        <div class="dialog-actions">
          <button type="button" class="btn btn-secondary" id="btn-cancel">Cancel</button>
          <button type="button" class="btn btn-danger" id="btn-delete" style="display:none">Delete</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../storage.js"></script>
  <script src="newtab.js"></script>
</body>
</html>
